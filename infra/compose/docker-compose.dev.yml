# UPM Platform — dev/MVP stack on a single host (§14).
# The backend is the SINGLE instance that owns the DuckDB file (do not scale it).
# Bring up:  docker compose -f infra/compose/docker-compose.dev.yml --env-file .env up --build
name: upm

x-backend-env: &backend-env
  UPM_DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-upm}:${POSTGRES_PASSWORD:-upm}@postgres:5432/${POSTGRES_DB:-upm}
  UPM_REDIS_URL: redis://redis:6379/0
  UPM_DUCKDB_PATH: /data/duckdb/analytics.duckdb
  UPM_LANDING_DIR: /data/landing
  UPM_EXPORT_DIR: /data/exports
  UPM_SOURCE_TYPE: ${UPM_SOURCE_TYPE:-synthetic}
  UPM_ALLOWED_SOURCE_SCHEMAS: ${UPM_ALLOWED_SOURCE_SCHEMAS:-SON}
  UPM_JWT_SECRET: ${UPM_JWT_SECRET:-dev-insecure-change-me-0123456789abcdef}
  UPM_STALE_K: ${UPM_STALE_K:-2.0}

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-upm}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-upm}
      POSTGRES_DB: ${POSTGRES_DB:-upm}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-upm}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: ../..
      dockerfile: infra/compose/Dockerfile.backend
    environment: *backend-env
    # Migrate, seed the demo, then serve. The backend is the sole DuckDB writer.
    command: >
      sh -c "cd /app/control-plane && alembic upgrade head &&
             cd /app && upm seed &&
             uvicorn upm_backend.main:app --host 0.0.0.0 --port 8000"
    volumes:
      - appdata:/data
    ports:
      - "8000:8000"
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/api/health').status==200 else 1)\""]
      interval: 10s
      timeout: 5s
      retries: 12
    labels:
      - traefik.enable=true
      - traefik.http.routers.api.rule=PathPrefix(`/api`)
      - traefik.http.services.api.loadbalancer.server.port=8000

  worker:
    build:
      context: ../..
      dockerfile: infra/compose/Dockerfile.backend
    environment: *backend-env
    command: celery -A upm_ingestion.celery_app:app worker -Q extraction --concurrency 4 --loglevel info
    volumes:
      - appdata:/data
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }

  scheduler:
    build:
      context: ../..
      dockerfile: infra/compose/Dockerfile.backend
    environment: *backend-env
    command: >
      sh -c "upm-scheduler sync &&
             celery -A upm_scheduler.celery_app:app beat --scheduler redbeat.RedBeatScheduler --loglevel info"
    depends_on:
      backend: { condition: service_healthy }
      redis: { condition: service_healthy }

  frontend:
    build:
      context: ../..
      dockerfile: apps/frontend/Dockerfile
    ports:
      - "8080:80"
    depends_on:
      - backend
    labels:
      - traefik.enable=true
      - traefik.http.routers.web.rule=PathPrefix(`/`)
      - traefik.http.services.web.loadbalancer.server.port=80

  traefik:
    image: traefik:v3.1
    command:
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --entrypoints.web.address=:80
    ports:
      - "80:80"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      - backend
      - frontend

  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ../observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana:latest
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_SERVER_ROOT_URL: "%(protocol)s://%(domain)s/grafana/"
      GF_SERVER_SERVE_FROM_SUB_PATH: "true"
    volumes:
      - grafanadata:/var/lib/grafana
    ports:
      - "3000:3000"

volumes:
  pgdata:
  appdata:
  grafanadata:
