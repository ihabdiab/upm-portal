[project]
name = "upm-shared"
version = "0.1.0"
description = "UPM shared contracts: Pydantic schemas for jobs, dashboards, query, catalog, auth."
requires-python = ">=3.12"
dependencies = ["pydantic>=2.7"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["upm_shared"]
