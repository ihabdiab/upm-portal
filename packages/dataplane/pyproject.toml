[project]
name = "upm-dataplane"
version = "0.1.0"
description = "DuckDB Gateway — the single RW owner of the analytics file (ADR-002)."
requires-python = ">=3.12"
dependencies = [
    "duckdb>=1.1",
    "upm-shared",
    "upm-sql-tools",
    "upm-control-plane",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["upm_dataplane"]

[tool.uv.sources]
upm-shared = { workspace = true }
upm-sql-tools = { workspace = true }
upm-control-plane = { workspace = true }
