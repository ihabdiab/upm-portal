[project]
name = "upm-sql-tools"
version = "0.1.0"
description = "Safe structured query builders (DuckDB + Oracle) and sqlglot SELECT-only validators."
requires-python = ">=3.12"
dependencies = ["sqlglot>=25", "upm-shared"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["upm_sql_tools"]

[tool.uv.sources]
upm-shared = { workspace = true }
